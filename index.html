<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Dからくり図鑑</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        /* トップページ専用の追加スタイル */
        .hero {
            text-align: center;
            padding: 2.5rem 1rem 1.5rem;
        }
        .hero h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 900;
            color: #0ea5e9;
            line-height: 1.25;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px #bae6fd;
            margin-bottom: 0.75rem;
        }
        .hero .lead {
            font-size: 1.05rem;
            font-weight: 700;
            color: #64748b;
            background: #fff;
            display: inline-block;
            padding: 0.4rem 1.5rem;
            border-radius: 9999px;
            border: 2px solid #e0f2fe;
        }

        /* エピソードカードグリッド */
        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.25rem;
            padding: 1.5rem 0 3rem;
        }

        .episode-card {
            background: #fff;
            border: 3px solid #e2e8f0;
            border-radius: 1.25rem;
            padding: 1.25rem;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .episode-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.10);
            border-color: var(--card-color, #38bdf8);
        }
        .episode-card.coming-soon {
            opacity: 0.55;
            cursor: default;
            pointer-events: none;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .card-emoji {
            font-size: 2.2rem;
            line-height: 1;
        }
        .card-num {
            font-size: 0.75rem;
            font-weight: 900;
            color: #94a3b8;
        }
        .card-title {
            font-size: 1.05rem;
            font-weight: 900;
            color: #1e293b;
            line-height: 1.3;
        }
        .card-mechanism {
            display: inline-block;
            font-size: 0.78rem;
            font-weight: 700;
            padding: 0.2rem 0.65rem;
            border-radius: 9999px;
            background: #f1f5f9;
            color: #64748b;
        }
        .card-desc {
            font-size: 0.88rem;
            font-weight: 700;
            color: #475569;
            line-height: 1.6;
        }
        .card-status {
            margin-top: auto;
            font-size: 0.78rem;
            font-weight: 700;
        }
        .card-status.published { color: #10b981; }
        .card-status.coming-soon { color: #94a3b8; }

        /* 色帯（カード上部） */
        .card-stripe {
            height: 6px;
            border-radius: 9999px;
            margin-bottom: 0.25rem;
        }
    </style>
</head>
<body>
<div class="page-wrapper">

    <!-- ヒーローヘッダー -->
    <div class="hero">
        <h1>3Dからくり図鑑 📖</h1>
        <p class="lead">身近なものの「なぜ動く？」を3Dで<ruby>分解<rt>ぶんかい</rt></ruby>してみよう</p>
    </div>

    <!-- エピソードカードグリッド -->
    <div class="episode-grid" id="episode-grid">
        <!-- JavaScriptで episodes.json から読み込んで生成 -->
    </div>

</div>

<script>
// episodes.json を読み込んでカードを生成
// ※ローカルファイルで動かす場合はサーバー（Live Server等）が必要です
fetch('./data/episodes.json')
    .then(r => r.json())
    .then(({ episodes }) => {
        const grid = document.getElementById('episode-grid');
        grid.innerHTML = episodes.map(ep => {
            const isPublished = ep.status === 'published';
            return `
            <a href="${isPublished ? ep.file : '#'}"
               class="episode-card ${isPublished ? '' : 'coming-soon'}"
               style="--card-color: ${ep.color}">
                <div class="card-stripe" style="background:${ep.color};"></div>
                <div class="card-header">
                    <span class="card-emoji">${ep.emoji}</span>
                    <div>
                        <p class="card-num">第 ${ep.id} 回</p>
                        <p class="card-title">${ep.title}</p>
                    </div>
                </div>
                <span class="card-mechanism">⚙️ ${ep.mechanism}</span>
                <p class="card-desc">❓ ${ep.question}</p>
                <p class="card-status ${isPublished ? 'published' : 'coming-soon'}">
                    ${isPublished ? '✅ 読める！' : '🔜 準備中'}
                </p>
            </a>`;
        }).join('');
    })
    .catch(() => {
        // JSONが読めない場合の静的フォールバック
        document.getElementById('episode-grid').innerHTML = `
            <a href="episodes/ep01.html" class="episode-card" style="--card-color:#38bdf8">
                <div class="card-stripe" style="background:#38bdf8;"></div>
                <div class="card-header">
                    <span class="card-emoji">🎠</span>
                    <div>
                        <p class="card-num">第 1 回</p>
                        <p class="card-title">メリーゴーランドの構造</p>
                    </div>
                </div>
                <span class="card-mechanism">⚙️ カム機構</span>
                <p class="card-desc">❓ なぜ上下に動くの？</p>
                <p class="card-status published">✅ 読める！</p>
            </a>
        `;
    });
</script>
</body>
</html>
